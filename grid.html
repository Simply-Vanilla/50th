<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carl Wooldridge | 50 Years — Grid View</title>

<script>
(function(){
    try {
        if(localStorage.getItem('theme') === 'dark'){
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    } catch(e){}
})();
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
<script src="crop-tools.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --cell-size:130px;

    --bg:#f8f6f3;
    --text:#222;
    --heading:#222;
    --muted:#777;
    --muted2:#888;
    --border:#ddd;
    --card-bg:#efece6;
    --control-bg:rgba(255,255,255,.85);
    --control-text:#888;
}

[data-theme="dark"]{
    --bg:#16161a;
    --text:#e6e4e0;
    --heading:#f2f0ec;
    --muted:#9a9a9a;
    --muted2:#8a8a8a;
    --border:#333;
    --card-bg:#1f1f24;
    --control-bg:rgba(35,35,40,.85);
    --control-text:#ccc;
}

body{

    background:var(--bg);
    color:var(--text);
    font-family:Inter,sans-serif;
    line-height:1.6;

    transition:background-color .3s ease, color .3s ease;
}

header{

    position:sticky;
    top:0;
    z-index:50;

    background:var(--bg);

    text-align:center;
    padding:60px 20px 28px;

    transition:background-color .3s ease, padding .25s ease;
}

header.compact{

    padding:16px 20px 12px;
}

header h1{

    font-family:"Cormorant Garamond",serif;
    font-size:68px;
    font-weight:400;
    letter-spacing:6px;
    color:var(--heading);

    transition:font-size .25s ease, letter-spacing .25s ease;
}

header.compact h1{

    font-size:30px;
    letter-spacing:3px;
}

header h2{

    margin-top:18px;
    font-size:20px;
    letter-spacing:5px;
    color:var(--muted);
    font-weight:300;

    transition:font-size .25s ease, margin-top .25s ease;
}

header.compact h2{

    margin-top:4px;
    font-size:12px;
}

header p{

    margin-top:30px;
    color:var(--muted);

    transition:font-size .25s ease, margin-top .25s ease;
}

header.compact p{

    margin-top:4px;
    font-size:11px;
}

.view-switch{

    margin-bottom:20px;

    transition:margin-bottom .25s ease;
}

header.compact .view-switch{

    margin-bottom:8px;
}

.view-switch a{

    color:var(--muted);
    font-size:10px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    text-decoration:none;
    border-bottom:1px solid var(--border);
    padding-bottom:2px;
    transition:color .2s ease, border-color .2s ease;
}

.view-switch a:hover{

    color:var(--heading);
    border-color:var(--heading);
}

.year-grid{

    width:min(1400px,94%);
    margin:20px auto 100px;

    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(var(--cell-size), 1fr));
    gap:26px 14px;

    transition:gap .2s ease;
}

.year-cell{

    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
}

.year-cell .year-label{

    font-family:"Cormorant Garamond",serif;
    font-size:clamp(12px, calc(var(--cell-size) * 0.115), 34px);
    letter-spacing:2px;
    color:var(--heading);
    transition:font-size .2s ease;
}

.photo-box{

    position:relative;
    width:100%;
    aspect-ratio:1/1;
    border-radius:6px;
    overflow:hidden;

    background:var(--card-bg);
    border:1px solid var(--border);
}

.photo-box.has-photo{

    cursor:pointer;
}

.photo-box img{

    display:block;
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:50% 20%;
    transition:transform .35s ease;
}

.photo-box.has-photo:hover img{

    transform:scale(1.06);
}

.photo-box.empty{

    display:flex;
    align-items:center;
    justify-content:center;
}

.photo-box.empty span{

    color:var(--muted2);
    font-size:clamp(12px, calc(var(--cell-size) * 0.14), 28px);
}

.size-control{

    position:fixed;
    top:24px;
    right:24px;
    z-index:100;

    display:flex;
    align-items:center;
    gap:10px;

    padding:10px 18px;
    border-radius:30px;

    background:var(--control-bg);
    backdrop-filter:blur(6px);
    box-shadow:0 6px 20px rgba(0,0,0,.08);

    font-size:11px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--control-text);

    transition:background-color .3s ease, color .3s ease, opacity .2s ease;
}

.size-control input[type=range]{

    width:110px;
    accent-color:var(--text);
}

.theme-toggle{

    position:fixed;
    top:24px;
    left:24px;
    z-index:100;

    width:44px;
    height:44px;
    border:none;
    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    background:var(--control-bg);
    backdrop-filter:blur(6px);
    box-shadow:0 6px 20px rgba(0,0,0,.08);

    font-size:18px;
    cursor:pointer;
    color:var(--control-text);

    transition:background-color .3s ease, color .3s ease, transform .2s ease, opacity .2s ease;
}

.theme-toggle:hover{

    transform:scale(1.08);
}

.lightbox{

    position:fixed;
    inset:0;
    z-index:300;

    display:none;
    align-items:center;
    justify-content:center;

    padding:60px 40px;

    background:rgba(0,0,0,.85);
}

.lightbox.open{

    display:flex;
}

.lightbox-content{

    position:relative;
    max-width:90vw;
    max-height:90vh;

    display:flex;
    flex-direction:column;
    align-items:center;
}

.lightbox-frame{

    position:relative;
    max-width:90vw;
    max-height:85vh;
    overflow:hidden;

    border-radius:8px;
    box-shadow:0 25px 60px rgba(0,0,0,.5);

    display:flex;
    align-items:center;
    justify-content:center;
}

.lightbox-frame img{

    display:block;
    max-width:90vw;
    max-height:85vh;
}

.lightbox-close,
.lightbox-nav{

    position:fixed;
    z-index:310;

    border:none;
    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    background:rgba(255,255,255,.15);
    color:#fff;
    line-height:1;
    cursor:pointer;

    transition:background-color .2s ease, opacity .2s ease;
}

.lightbox-close{

    top:24px;
    right:24px;
    width:44px;
    height:44px;
    font-size:24px;
}

.lightbox-nav{

    top:50%;
    transform:translateY(-50%);
    width:48px;
    height:48px;
    font-size:18px;
}

.lightbox-prev{ left:24px; }
.lightbox-next{ right:24px; }

.lightbox-close:hover,
.lightbox-nav:hover{

    background:rgba(255,255,255,.3);
}

.lightbox-nav:disabled{

    opacity:0;
    pointer-events:none;
}

body.lightbox-active .theme-toggle,
body.lightbox-active .size-control,
body.lightbox-active .ct-edit-toggle{

    opacity:0;
    pointer-events:none;
}

footer{

    text-align:center;
    padding:80px 20px 100px;
    color:var(--muted);
    font-family:"Cormorant Garamond",serif;
    font-size:28px;
}

@media(max-width:700px){

.year-grid{

    gap:20px 10px;
}

header h1{

    font-size:48px;
}

header.compact h1{

    font-size:24px;
}

.theme-toggle{

    top:14px;
    left:14px;
    width:38px;
    height:38px;
    font-size:16px;
}

.size-control{

    top:14px;
    right:14px;
    padding:8px 14px;
}

.size-control input[type=range]{

    width:80px;
}

.lightbox-close{

    top:14px;
    right:14px;
}

.lightbox-nav{

    width:38px;
    height:38px;
    font-size:15px;
}

.lightbox-prev{ left:10px; }
.lightbox-next{ right:10px; }

}

</style>

</head>

<body>

<button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">🌙</button>

<div class="size-control">
<label for="sizeSlider">Size</label>
<input type="range" id="sizeSlider" min="70" max="260" step="10" value="130">
</div>

<header>

<div class="view-switch">
<a href="index.html">Timeline View →</a>
</div>

<h1>CARL WOOLDRIDGE</h1>

<h2>50 YEARS</h2>

<p>August 1976 — August 2026</p>

</header>

<div class="year-grid" id="yearGrid"></div>

<footer>

“The days are long, but the years are short.”

</footer>

<div class="lightbox" id="lightbox">
<button class="lightbox-close" id="lightboxClose" aria-label="Close">&times;</button>
<button class="lightbox-nav lightbox-prev" id="lightboxPrev" aria-label="Previous photo">&#10094;</button>
<button class="lightbox-nav lightbox-next" id="lightboxNext" aria-label="Next photo">&#10095;</button>
<div class="lightbox-content">
<div class="lightbox-frame" id="lightboxFrame">
<img id="lightboxImg" src="" alt="">
</div>
</div>
</div>

<script>

const START_YEAR = 1976;
const END_YEAR = 2026;

function checkImage(src){
    return new Promise(resolve => {
        const img = new Image();
        img.onload = () => resolve(true);
        img.onerror = () => resolve(false);
        img.src = src;
    });
}

let cropTargets = [];
const lightboxSequence = [];

async function buildGrid(){
    const grid = document.getElementById('yearGrid');
    grid.innerHTML = '';
    cropTargets = [];
    lightboxSequence.length = 0;

    const crops = await CropTools.loadCrops();

    const yearPromises = [];
    for(let year = START_YEAR; year <= END_YEAR; year++){
        const num = CropTools.getYearPhotoNumber(crops, year);
        const key = `${year}-${num}`;
        const src = CropTools.photoUrl(crops, key);
        yearPromises.push(checkImage(src).then(ok => ({ year, src, ok, num, key })));
    }
    const years = await Promise.all(yearPromises);

    years.forEach(({ year, src, ok, num, key }) => {
        const cell = document.createElement('div');
        cell.className = 'year-cell';

        const label = document.createElement('div');
        label.className = 'year-label';
        label.textContent = year;
        cell.appendChild(label);

        const box = document.createElement('div');
        box.className = 'photo-box';

        let img = null;
        let cropRect = null;

        if(ok){
            box.classList.add('has-photo');
            const lightboxIndex = lightboxSequence.length;
            lightboxSequence.push({ key, src, alt: `${year}` });
            img = document.createElement('img');
            img.src = src;
            img.loading = 'lazy';
            img.alt = `${year}`;
            img.addEventListener('click', () => {
                if(CropTools.isEditMode()) CropTools.openEditor(key, src, year);
                else openLightboxAt(lightboxIndex);
            });
            box.appendChild(img);
            cropRect = crops[key] && crops[key].grid;
        } else {
            box.classList.add('empty');
            box.innerHTML = '<span>—</span>';
        }

        cell.appendChild(box);
        grid.appendChild(cell);

        // Apply the crop only after box/img are attached to the live DOM,
        // otherwise box.clientWidth is still 0 and the transform is a no-op.
        if(cropRect){
            const target = { img, box, cropRect };
            cropTargets.push(target);
            if(img.complete && img.naturalWidth) CropTools.applyCrop(img, box, cropRect);
            else img.addEventListener('load', () => CropTools.applyCrop(img, box, cropRect), { once: true });
        }
    });
}

function reapplyCrops(){
    cropTargets.forEach(({ img, box, cropRect }) => {
        if(img.complete && img.naturalWidth) CropTools.applyCrop(img, box, cropRect);
    });
}

CropTools.init();
CropTools.onSaved(() => { buildGrid(); });

buildGrid();

const sizeSlider = document.getElementById('sizeSlider');
const savedSize = localStorage.getItem('gridCellSize');
if(savedSize) sizeSlider.value = savedSize;

function applyCellSize(){
    document.documentElement.style.setProperty('--cell-size', sizeSlider.value + 'px');
}

applyCellSize();

sizeSlider.addEventListener('input', () => {
    localStorage.setItem('gridCellSize', sizeSlider.value);
    applyCellSize();
    requestAnimationFrame(reapplyCrops);
});

window.addEventListener('resize', () => {
    requestAnimationFrame(reapplyCrops);
});

let headerCompact = false;

function updateHeaderScroll(){
    const header = document.querySelector('header');
    const y = window.scrollY;
    if(!headerCompact && y > 40) headerCompact = true;
    else if(headerCompact && y < 10) headerCompact = false;
    header.classList.toggle('compact', headerCompact);
}

window.addEventListener('scroll', updateHeaderScroll, { passive: true });
updateHeaderScroll();

const themeToggle = document.getElementById('themeToggle');

function applyTheme(theme){
    if(theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    else document.documentElement.removeAttribute('data-theme');
    themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
    localStorage.setItem('theme', theme);
}

applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light');

themeToggle.addEventListener('click', () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    applyTheme(isDark ? 'light' : 'dark');
});

const lightbox = document.getElementById('lightbox');
const lightboxFrame = document.getElementById('lightboxFrame');
const lightboxImg = document.getElementById('lightboxImg');
const lightboxClose = document.getElementById('lightboxClose');
const lightboxPrev = document.getElementById('lightboxPrev');
const lightboxNext = document.getElementById('lightboxNext');

let currentLightboxIndex = -1;

function resetLightboxFrame(){
    lightboxFrame.style.width = '';
    lightboxFrame.style.height = '';
    lightboxImg.style.position = '';
    lightboxImg.style.width = '';
    lightboxImg.style.height = '';
    lightboxImg.style.left = '';
    lightboxImg.style.top = '';
    lightboxImg.style.maxWidth = '';
    lightboxImg.style.maxHeight = '';
}

async function openLightboxAt(index){
    if(index < 0 || index >= lightboxSequence.length) return;
    currentLightboxIndex = index;
    const entry = lightboxSequence[index];

    resetLightboxFrame();
    lightboxImg.src = entry.src;
    lightboxImg.alt = entry.alt || '';

    lightboxPrev.disabled = index === 0;
    lightboxNext.disabled = index === lightboxSequence.length - 1;

    // Must be visible (display:flex, not display:none) before applyCropFit
    // runs, since it reads clientWidth/clientHeight off the frame - those
    // are 0 on a display:none element regardless of any inline size set.
    lightbox.classList.add('open');
    document.body.classList.add('lightbox-active');
    document.body.style.overflow = 'hidden';

    const crops = await CropTools.loadCrops();
    const cropRect = crops[entry.key] && crops[entry.key].grid;
    if(cropRect){
        const fit = () => {
            CropTools.applyCropFit(lightboxImg, lightboxFrame, cropRect, window.innerWidth * 0.9, window.innerHeight * 0.85);
        };
        if(lightboxImg.complete && lightboxImg.naturalWidth) fit();
        else lightboxImg.addEventListener('load', fit, { once: true });
    }
}

function closeLightbox(){
    lightbox.classList.remove('open');
    document.body.classList.remove('lightbox-active');
    document.body.style.overflow = '';
}

lightboxClose.addEventListener('click', closeLightbox);
lightboxPrev.addEventListener('click', () => openLightboxAt(currentLightboxIndex - 1));
lightboxNext.addEventListener('click', () => openLightboxAt(currentLightboxIndex + 1));

lightbox.addEventListener('click', e => {
    if(e.target === lightbox) closeLightbox();
});

document.addEventListener('keydown', e => {
    if(e.key === 'Escape') closeLightbox();
    if(!lightbox.classList.contains('open')) return;
    if(e.key === 'ArrowLeft') openLightboxAt(currentLightboxIndex - 1);
    else if(e.key === 'ArrowRight') openLightboxAt(currentLightboxIndex + 1);
});

window.addEventListener('resize', () => {
    if(lightbox.classList.contains('open')) openLightboxAt(currentLightboxIndex);
});

</script>

</body>
</html>
