<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carl Wooldridge | 50 Years — Grid View</title>

<script>
(function(){
    try {
        if(localStorage.getItem('theme') === 'dark'){
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    } catch(e){}
})();
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --bg:#f8f6f3;
    --text:#222;
    --heading:#222;
    --muted:#777;
    --muted2:#888;
    --border:#ddd;
    --card-bg:#efece6;
    --control-bg:rgba(255,255,255,.85);
    --control-text:#888;
}

[data-theme="dark"]{
    --bg:#16161a;
    --text:#e6e4e0;
    --heading:#f2f0ec;
    --muted:#9a9a9a;
    --muted2:#8a8a8a;
    --border:#333;
    --card-bg:#1f1f24;
    --control-bg:rgba(35,35,40,.85);
    --control-text:#ccc;
}

body{

    background:var(--bg);
    color:var(--text);
    font-family:Inter,sans-serif;
    line-height:1.6;

    transition:background-color .3s ease, color .3s ease;
}

header{

    text-align:center;
    padding:60px 20px 28px;
}

header h1{

    font-family:"Cormorant Garamond",serif;
    font-size:68px;
    font-weight:400;
    letter-spacing:6px;
    color:var(--heading);
}

header h2{

    margin-top:18px;
    font-size:20px;
    letter-spacing:5px;
    color:var(--muted);
    font-weight:300;
}

header p{

    margin-top:30px;
    color:var(--muted);
}

.view-switch{

    margin-top:22px;
}

.view-switch a{

    color:var(--muted);
    font-size:12px;
    letter-spacing:2px;
    text-transform:uppercase;
    text-decoration:none;
    border-bottom:1px solid var(--border);
    padding-bottom:2px;
    transition:color .2s ease, border-color .2s ease;
}

.view-switch a:hover{

    color:var(--heading);
    border-color:var(--heading);
}

.year-grid{

    width:min(1400px,94%);
    margin:20px auto 100px;

    display:grid;
    grid-template-columns:repeat(10, 1fr);
    gap:26px 14px;
}

.year-cell{

    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
}

.year-cell .year-label{

    font-family:"Cormorant Garamond",serif;
    font-size:15px;
    letter-spacing:2px;
    color:var(--heading);
}

.photo-box{

    position:relative;
    width:100%;
    aspect-ratio:4/5;
    border-radius:6px;
    overflow:hidden;

    background:var(--card-bg);
    border:1px solid var(--border);
}

.photo-box.has-photo{

    cursor:pointer;
}

.photo-box img{

    display:block;
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:50% 20%;
    transition:transform .35s ease;
}

.photo-box.has-photo:hover img{

    transform:scale(1.06);
}

.photo-box.empty{

    display:flex;
    align-items:center;
    justify-content:center;
}

.photo-box.empty span{

    color:var(--muted2);
    font-size:18px;
}

.theme-toggle{

    position:fixed;
    top:24px;
    left:24px;
    z-index:100;

    width:44px;
    height:44px;
    border:none;
    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    background:var(--control-bg);
    backdrop-filter:blur(6px);
    box-shadow:0 6px 20px rgba(0,0,0,.08);

    font-size:18px;
    cursor:pointer;
    color:var(--control-text);

    transition:background-color .3s ease, color .3s ease, transform .2s ease, opacity .2s ease;
}

.theme-toggle:hover{

    transform:scale(1.08);
}

.lightbox{

    position:fixed;
    inset:0;
    z-index:300;

    display:none;
    align-items:center;
    justify-content:center;

    padding:60px 40px;

    background:rgba(0,0,0,.85);
}

.lightbox.open{

    display:flex;
}

.lightbox-content{

    position:relative;
    max-width:90vw;
    max-height:90vh;

    display:flex;
    flex-direction:column;
    align-items:center;
}

.lightbox-content img{

    display:block;
    max-width:90vw;
    max-height:85vh;
    border-radius:8px;
    box-shadow:0 25px 60px rgba(0,0,0,.5);
}

.lightbox-close{

    position:fixed;
    top:24px;
    right:24px;
    z-index:310;

    width:44px;
    height:44px;
    border:none;
    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    background:rgba(255,255,255,.15);
    color:#fff;
    font-size:24px;
    line-height:1;
    cursor:pointer;

    transition:background-color .2s ease;
}

.lightbox-close:hover{

    background:rgba(255,255,255,.3);
}

body.lightbox-active .theme-toggle{

    opacity:0;
    pointer-events:none;
}

footer{

    text-align:center;
    padding:80px 20px 100px;
    color:var(--muted);
    font-family:"Cormorant Garamond",serif;
    font-size:28px;
}

@media(max-width:1100px){

.year-grid{

    grid-template-columns:repeat(6, 1fr);
}

}

@media(max-width:700px){

.year-grid{

    grid-template-columns:repeat(4, 1fr);
    gap:20px 10px;
}

header h1{

    font-size:48px;
}

.theme-toggle{

    top:14px;
    left:14px;
    width:38px;
    height:38px;
    font-size:16px;
}

.lightbox-close{

    top:14px;
    right:14px;
}

}

@media(max-width:420px){

.year-grid{

    grid-template-columns:repeat(3, 1fr);
}

}

</style>

</head>

<body>

<button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">🌙</button>

<header>

<h1>CARL WOOLDRIDGE</h1>

<h2>50 YEARS</h2>

<p>August 1976 — August 2026</p>

<div class="view-switch">
<a href="index.html">Timeline View →</a>
</div>

</header>

<div class="year-grid" id="yearGrid"></div>

<footer>

“The days are long, but the years are short.”

</footer>

<div class="lightbox" id="lightbox">
<button class="lightbox-close" id="lightboxClose" aria-label="Close">&times;</button>
<div class="lightbox-content">
<img id="lightboxImg" src="" alt="">
</div>
</div>

<script>

const START_YEAR = 1976;
const END_YEAR = 2026;

function checkImage(src){
    return new Promise(resolve => {
        const img = new Image();
        img.onload = () => resolve(true);
        img.onerror = () => resolve(false);
        img.src = src;
    });
}

async function buildGrid(){
    const grid = document.getElementById('yearGrid');

    const yearPromises = [];
    for(let year = START_YEAR; year <= END_YEAR; year++){
        const src = `photos/${year}-1.jpg`;
        yearPromises.push(checkImage(src).then(ok => ({ year, src, ok })));
    }
    const years = await Promise.all(yearPromises);

    years.forEach(({ year, src, ok }) => {
        const cell = document.createElement('div');
        cell.className = 'year-cell';

        const label = document.createElement('div');
        label.className = 'year-label';
        label.textContent = year;
        cell.appendChild(label);

        const box = document.createElement('div');
        box.className = 'photo-box';

        if(ok){
            box.classList.add('has-photo');
            const img = document.createElement('img');
            img.src = src;
            img.loading = 'lazy';
            img.alt = `${year}`;
            img.addEventListener('click', () => openLightbox(src, `${year}`));
            box.appendChild(img);
        } else {
            box.classList.add('empty');
            box.innerHTML = '<span>—</span>';
        }

        cell.appendChild(box);
        grid.appendChild(cell);
    });
}

buildGrid();

const themeToggle = document.getElementById('themeToggle');

function applyTheme(theme){
    if(theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    else document.documentElement.removeAttribute('data-theme');
    themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
    localStorage.setItem('theme', theme);
}

applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light');

themeToggle.addEventListener('click', () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    applyTheme(isDark ? 'light' : 'dark');
});

const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightboxImg');
const lightboxClose = document.getElementById('lightboxClose');

function openLightbox(src, alt){
    lightboxImg.src = src;
    lightboxImg.alt = alt || '';
    lightbox.classList.add('open');
    document.body.classList.add('lightbox-active');
    document.body.style.overflow = 'hidden';
}

function closeLightbox(){
    lightbox.classList.remove('open');
    document.body.classList.remove('lightbox-active');
    document.body.style.overflow = '';
}

lightboxClose.addEventListener('click', closeLightbox);

lightbox.addEventListener('click', e => {
    if(e.target === lightbox) closeLightbox();
});

document.addEventListener('keydown', e => {
    if(e.key === 'Escape') closeLightbox();
});

</script>

</body>
</html>
