<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --header-height:320px;

    --bg:#f8f6f3;
    --text:#222;
    --heading:#222;
    --muted:#777;
    --muted2:#888;
    --border:#ddd;
    --control-bg:rgba(255,255,255,.85);
    --control-text:#888;
}

[data-theme="dark"]{
    --bg:#16161a;
    --text:#e6e4e0;
    --heading:#f2f0ec;
    --muted:#9a9a9a;
    --muted2:#8a8a8a;
    --border:#333;
    --control-bg:rgba(35,35,40,.85);
    --control-text:#ccc;
}

body{

    background:var(--bg);
    color:var(--text);
    font-family:Inter,sans-serif;
    line-height:1.6;

    transition:background-color .3s ease, color .3s ease;
}

header{

    position:sticky;
    top:0;
    z-index:50;

    background:var(--bg);

    text-align:center;
    padding:60px 20px 28px;

    transition:background-color .3s ease, padding .25s ease;
}

header.compact{

    padding:16px 20px 12px;
}

header h1{

    font-family:"Cormorant Garamond",serif;
    font-size:68px;
    font-weight:400;
    letter-spacing:6px;
    color:var(--heading);

    transition:font-size .25s ease, letter-spacing .25s ease;
}

header.compact h1{

    font-size:30px;
    letter-spacing:3px;
}

header h2{

    margin-top:18px;
    font-size:20px;
    letter-spacing:5px;
    color:var(--muted);
    font-weight:300;

    transition:font-size .25s ease, margin-top .25s ease;
}

header.compact h2{

    margin-top:4px;
    font-size:12px;
}

header p{

    margin-top:30px;
    color:var(--muted);

    transition:font-size .25s ease, margin-top .25s ease;
}

header.compact p{

    margin-top:4px;
    font-size:11px;
}

.view-switch{

    margin-bottom:20px;

    transition:margin-bottom .25s ease;
}

header.compact .view-switch{

    margin-bottom:8px;
}

.view-switch a{

    color:var(--muted);
    font-size:10px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    text-decoration:none;
    border-bottom:1px solid var(--border);
    padding-bottom:2px;
    transition:color .2s ease, border-color .2s ease;
}

.view-switch a:hover{

    color:var(--heading);
    border-color:var(--heading);
}

.timeline{

    width:min(1050px,92%);
    margin:auto;
}

.empty-state{

    text-align:center;
    padding:60px 20px;
    color:var(--muted2);
    font-family:"Cormorant Garamond",serif;
    font-size:22px;
}

.year{

    display:grid;
    grid-template-columns:220px 1fr;
    gap:70px;

    padding:90px 0;

    border-top:1px solid var(--border);
}

.year:first-child{

    border-top:none;
}

.year-label{

    position:sticky;
    top:calc(var(--header-height) + 24px);
    align-self:start;
}

.year-number{

    font-family:"Cormorant Garamond",serif;
    font-size:64px;
    font-weight:400;
}

.year-sub{

    margin-top:8px;
    color:var(--muted2);
    letter-spacing:2px;
    font-size:13px;
    text-transform:uppercase;
}

.photos{

    display:flex;
    flex-wrap:wrap;
    align-items:flex-start;
    gap:16px;
}

.photo{

    position:relative;
    overflow:hidden;
    border-radius:8px;
    line-height:0;
}

.photo img{

    display:block;
    width:auto;
    max-width:100%;
    border-radius:8px;
    cursor:pointer;
    transition:height .2s ease, transform .35s ease;
}

.photo:hover img{

    transform:scale(1.03);
}

.height-control{

    position:fixed;
    top:24px;
    right:24px;
    z-index:100;

    display:flex;
    align-items:center;
    gap:10px;

    padding:10px 18px;
    border-radius:30px;

    background:var(--control-bg);
    backdrop-filter:blur(6px);
    box-shadow:0 6px 20px rgba(0,0,0,.08);

    font-size:11px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--control-text);

    transition:background-color .3s ease, color .3s ease, opacity .2s ease;
}

.height-control input[type=range]{

    width:110px;
    accent-color:var(--text);
}

.theme-toggle{

    position:fixed;
    top:24px;
    left:24px;
    z-index:100;

    width:44px;
    height:44px;
    border:none;
    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    background:var(--control-bg);
    backdrop-filter:blur(6px);
    box-shadow:0 6px 20px rgba(0,0,0,.08);

    font-size:18px;
    cursor:pointer;
    color:var(--control-text);

    transition:background-color .3s ease, color .3s ease, transform .2s ease, opacity .2s ease;
}

.theme-toggle:hover{

    transform:scale(1.08);
}

.photo .caption{

    position:absolute;
    left:0;
    right:0;
    bottom:0;

    padding:14px 16px 12px;
    font-size:13px;
    line-height:1.4;
    color:#fff;

    background:linear-gradient(to top, rgba(0,0,0,.65), rgba(0,0,0,0));

    opacity:0;
    transition:opacity .25s ease;
    pointer-events:none;
}

.photo:hover .caption{

    opacity:1;
}

.lightbox{

    position:fixed;
    inset:0;
    z-index:300;

    display:none;
    align-items:center;
    justify-content:center;

    padding:60px 40px;

    background:rgba(0,0,0,.85);
}

.lightbox.open{

    display:flex;
}

.lightbox-content{

    position:relative;
    max-width:90vw;
    max-height:90vh;

    display:flex;
    flex-direction:column;
    align-items:center;
}

.lightbox-frame{

    position:relative;
    max-width:90vw;
    max-height:80vh;
    overflow:hidden;

    border-radius:8px;
    box-shadow:0 25px 60px rgba(0,0,0,.5);

    display:flex;
    align-items:center;
    justify-content:center;
}

.lightbox-frame img{

    display:block;
    max-width:90vw;
    max-height:80vh;
}

.lightbox-caption{

    margin-top:18px;
    max-width:600px;

    color:#f2f0ec;
    font-size:15px;
    text-align:center;
}

.lightbox-close,
.lightbox-nav{

    position:fixed;
    z-index:310;

    border:none;
    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    background:rgba(255,255,255,.15);
    color:#fff;
    line-height:1;
    cursor:pointer;

    transition:background-color .2s ease, opacity .2s ease;
}

.lightbox-close{

    top:24px;
    right:24px;
    width:44px;
    height:44px;
    font-size:24px;
}

.lightbox-nav{

    top:50%;
    transform:translateY(-50%);
    width:48px;
    height:48px;
    font-size:18px;
}

.lightbox-prev{ left:24px; }
.lightbox-next{ right:24px; }

.lightbox-close:hover,
.lightbox-nav:hover{

    background:rgba(255,255,255,.3);
}

.lightbox-nav:disabled{

    opacity:0;
    pointer-events:none;
}

body.lightbox-active .height-control,
body.lightbox-active .theme-toggle,
body.lightbox-active .ct-edit-toggle{

    opacity:0;
    pointer-events:none;
}

footer{

    text-align:center;
    padding:120px 20px;
    color:var(--muted);
    font-family:"Cormorant Garamond",serif;
    font-size:28px;
}

@media(max-width:900px){

.year{

    grid-template-columns:1fr;
    gap:35px;
    padding:60px 0;
}

.year-label{

    position:relative;
    top:auto;
}

.year-number{

    font-size:48px;
}

header h1{

    font-size:48px;
}

header.compact h1{

    font-size:24px;
}

.height-control{

    top:14px;
    right:14px;
    padding:8px 14px;
}

.height-control input[type=range]{

    width:80px;
}

.theme-toggle{

    top:14px;
    left:14px;
    width:38px;
    height:38px;
    font-size:16px;
}

.lightbox-close{

    top:14px;
    right:14px;
}

.lightbox-nav{

    width:38px;
    height:38px;
    font-size:15px;
}

.lightbox-prev{ left:10px; }
.lightbox-next{ right:10px; }

}

</style>

</head>

<body>

<button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">🌙</button>

<div class="height-control">
<label for="heightSlider">Height</label>
<input type="range" id="heightSlider" min="60" max="600" step="10" value="300">
</div>

<header>

<div class="view-switch">
<a href="grid.html">Grid View →</a>
</div>

<h1>CARL WOOLDRIDGE</h1>

<h2>50 YEARS</h2>

<p>August 1976 — August 2026</p>

</header>

<div class="timeline" id="timeline"></div>

<footer>

“The days are long, but the years are short.”

</footer>

<div class="lightbox" id="lightbox">
<button class="lightbox-close" id="lightboxClose" aria-label="Close">&times;</button>
<button class="lightbox-nav lightbox-prev" id="lightboxPrev" aria-label="Previous photo">&#10094;</button>
<button class="lightbox-nav lightbox-next" id="lightboxNext" aria-label="Next photo">&#10095;</button>
<div class="lightbox-content">
<div class="lightbox-frame" id="lightboxFrame">
<img id="lightboxImg" src="" alt="">
</div>
<div class="lightbox-caption" id="lightboxCaption"></div>
</div>
</div>

<script>

const START_YEAR = 1976;
const END_YEAR = 2026;
const MAX_PHOTOS_PER_YEAR = 40;
const PHOTO_GAP = 16;

function loadImage(src){
    return new Promise(resolve => {
        const img = new Image();
        img.onload = () => resolve({ ok: true, ratio: img.naturalWidth / img.naturalHeight || 1 });
        img.onerror = () => resolve({ ok: false });
        img.src = src;
    });
}

// Deleting a photo leaves a gap in its year's numbering (e.g. 1990-2 gone
// but 1990-3 still there), so stopping at the first miss would silently
// drop every later photo in that year too. Tolerate a run of consecutive
// misses before concluding there's really nothing more, instead of bailing
// on the very first one - scanning all MAX_PHOTOS_PER_YEAR slots
// unconditionally for every year would be needlessly expensive.
const GAP_TOLERANCE = 5;

async function findPhotosForYear(year, crops){
    const photos = [];
    let consecutiveMisses = 0;
    for(let n = 1; n <= MAX_PHOTOS_PER_YEAR; n++){
        const key = `${year}-${n}`;
        const src = CropTools.photoUrl(crops, key);
        const result = await loadImage(src);
        if(!result.ok){
            consecutiveMisses++;
            if(consecutiveMisses >= GAP_TOLERANCE) break;
            continue;
        }
        consecutiveMisses = 0;
        photos.push({ src, key, ratio: result.ratio });
    }
    return photos;
}

function debounce(fn, wait){
    let t;
    return (...args) => {
        clearTimeout(t);
        t = setTimeout(() => fn(...args), wait);
    };
}

function simulateRowCount(items, containerWidth, rowHeight, gap){
    let rows = 1, cur = 0;
    items.forEach((item, i) => {
        const w = Math.min(rowHeight * item.ratio, containerWidth);
        if(i === 0){ cur = w; return; }
        if(cur + gap + w > containerWidth){ rows++; cur = w; }
        else cur += gap + w;
    });
    return rows;
}

function computeRowHeight(items, containerWidth, targetHeight, gap){
    if(items.length === 0 || containerWidth <= 0) return targetHeight;
    let lo = 20, hi = Math.max(targetHeight, 20);
    for(let i = 0; i < 20; i++){
        const mid = (lo + hi) / 2;
        const rows = simulateRowCount(items, containerWidth, mid, gap);
        const total = rows * mid + (rows - 1) * gap;
        if(total > targetHeight) hi = mid; else lo = mid;
    }
    return lo;
}

const yearBlocks = [];
const lightboxSequence = [];
let dragSrcEl = null;

function finishReorder(grid, year){
    const newOrder = Array.from(grid.children).map(c => parseInt(c.dataset.num, 10));
    CropTools.setYearOrder(year, newOrder);

    const block = yearBlocks.find(b => b.photosEl === grid);
    if(block){
        const domOrder = Array.from(grid.children);
        block.items.sort((a, b) => domOrder.indexOf(a.imgEl.parentElement) - domOrder.indexOf(b.imgEl.parentElement));
    }
    layoutAll();
}

function layoutYear(block, targetHeight){
    const containerWidth = block.photosEl.clientWidth;
    const rowHeight = computeRowHeight(block.items, containerWidth, targetHeight, PHOTO_GAP);
    block.items.forEach(item => {
        if(item.crop){
            const card = item.imgEl.parentElement;
            card.style.width = (rowHeight * item.ratio) + 'px';
            card.style.height = rowHeight + 'px';
            if(item.imgEl.complete && item.imgEl.naturalWidth){
                CropTools.applyCrop(item.imgEl, card, item.crop);
            } else {
                item.imgEl.addEventListener('load', () => CropTools.applyCrop(item.imgEl, card, item.crop), { once: true });
            }
        } else {
            item.imgEl.style.height = rowHeight + 'px';
        }
    });
}

function layoutAll(){
    const targetHeight = parseFloat(heightSlider.value);
    yearBlocks.forEach(block => layoutYear(block, targetHeight));
}

function updateHeaderHeightVar(){
    const header = document.querySelector('header');
    document.documentElement.style.setProperty('--header-height', header.offsetHeight + 'px');
}

let headerCompact = false;

function updateHeaderScroll(){
    const header = document.querySelector('header');
    const y = window.scrollY;
    if(!headerCompact && y > 40) headerCompact = true;
    else if(headerCompact && y < 10) headerCompact = false;
    header.classList.toggle('compact', headerCompact);
    updateHeaderHeightVar();
}

function parseCSV(text){
    const rows = [];
    let row = [], field = '', inQuotes = false;
    for(let i = 0; i < text.length; i++){
        const c = text[i];
        if(inQuotes){
            if(c === '"'){
                if(text[i+1] === '"'){ field += '"'; i++; }
                else inQuotes = false;
            } else field += c;
        } else {
            if(c === '"') inQuotes = true;
            else if(c === ',') { row.push(field); field = ''; }
            else if(c === '\n' || c === '\r'){
                if(c === '\r' && text[i+1] === '\n') i++;
                row.push(field); field = '';
                if(row.length > 1 || row[0] !== '') rows.push(row);
                row = [];
            } else field += c;
        }
    }
    if(field !== '' || row.length){ row.push(field); rows.push(row); }
    return rows;
}

async function loadCaptions(){
    const map = {};
    try {
        const res = await fetch('captions.csv');
        if(!res.ok) return map;
        const text = await res.text();
        const rows = parseCSV(text);
        for(const row of rows){
            if(row.length < 2) continue;
            const key = (row[0] || '').trim();
            const caption = (row[1] || '').trim();
            if(!key || key.toLowerCase() === 'key') continue;
            map[key] = caption;
        }
    } catch(e){
        console.warn('Could not load captions.csv', e);
    }
    return map;
}

async function buildTimeline(){
    const timeline = document.getElementById('timeline');
    timeline.innerHTML = '';
    yearBlocks.length = 0;
    lightboxSequence.length = 0;
    const [captions, crops] = await Promise.all([loadCaptions(), CropTools.loadCrops()]);

    const yearPromises = [];
    for(let year = START_YEAR; year <= END_YEAR; year++){
        yearPromises.push(findPhotosForYear(year, crops).then(photos => ({ year, photos })));
    }
    const years = await Promise.all(yearPromises);

    let rendered = 0;

    for(const { year, photos: unorderedPhotos } of years){
        if(unorderedPhotos.length === 0) continue;
        rendered++;

        const availableNums = unorderedPhotos.map(p => parseInt(p.key.split('-')[1], 10));
        const order = CropTools.getYearOrder(crops, year, availableNums);
        const photos = order.map(n => unorderedPhotos.find(p => parseInt(p.key.split('-')[1], 10) === n));

        const section = document.createElement('section');
        section.className = 'year';

        const label = document.createElement('div');
        label.className = 'year-label';

        const num = document.createElement('div');
        num.className = 'year-number';
        num.textContent = year;
        label.appendChild(num);

        const sub = captions[String(year)];
        if(sub){
            const subEl = document.createElement('div');
            subEl.className = 'year-sub';
            subEl.textContent = sub;
            label.appendChild(subEl);
        }

        section.appendChild(label);

        const grid = document.createElement('div');
        grid.className = 'photos';

        grid.addEventListener('dragover', e => {
            if(!CropTools.isEditMode() || !dragSrcEl) return;
            if(e.target !== grid) return;
            if(dragSrcEl.parentElement !== grid) return;
            e.preventDefault();
            grid.appendChild(dragSrcEl);
        });

        const items = [];

        for(const photo of photos){
            const card = document.createElement('div');
            card.className = 'photo';
            card.draggable = true;
            card.dataset.num = photo.key.split('-')[1];

            card.addEventListener('dragstart', e => {
                if(!CropTools.isEditMode()){ e.preventDefault(); return; }
                dragSrcEl = card;
                card.classList.add('ct-dragging');
                e.dataTransfer.effectAllowed = 'move';
            });

            card.addEventListener('dragend', () => {
                card.classList.remove('ct-dragging');
                if(dragSrcEl === card) dragSrcEl = null;
                finishReorder(grid, year);
            });

            card.addEventListener('dragover', e => {
                if(!CropTools.isEditMode() || !dragSrcEl || dragSrcEl === card) return;
                if(dragSrcEl.parentElement !== card.parentElement) return;
                e.preventDefault();
                const rect = card.getBoundingClientRect();
                const before = (e.clientX - rect.left) < rect.width / 2;
                grid.insertBefore(dragSrcEl, before ? card : card.nextSibling);
            });

            const img = document.createElement('img');
            img.src = photo.src;
            img.loading = 'lazy';
            img.alt = captions[photo.key] || `${year} photo`;
            const lightboxIndex = lightboxSequence.length;
            lightboxSequence.push({ key: photo.key, src: photo.src, alt: img.alt, caption: captions[photo.key] });
            img.addEventListener('click', () => {
                if(CropTools.isEditMode()) CropTools.openEditor(photo.key, photo.src, year);
                else openLightboxAt(lightboxIndex);
            });
            card.appendChild(img);

            const cap = captions[photo.key];
            if(cap){
                const capEl = document.createElement('div');
                capEl.className = 'caption';
                capEl.textContent = cap;
                card.appendChild(capEl);
            }

            grid.appendChild(card);

            const cropRect = crops[photo.key] && crops[photo.key].timeline;
            const ratio = cropRect ? (cropRect.w / cropRect.h) * photo.ratio : photo.ratio;
            items.push({ ratio, imgEl: img, crop: cropRect || null });
        }

        section.appendChild(grid);
        timeline.appendChild(section);

        yearBlocks.push({ photosEl: grid, items });
    }

    if(rendered === 0){
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.textContent = 'Photos will appear here as they’re added to the photos/ folder.';
        timeline.appendChild(empty);
    }
}

const heightSlider = document.getElementById('heightSlider');
const savedHeight = localStorage.getItem('yearHeight');
if(savedHeight) heightSlider.value = savedHeight;

updateHeaderHeightVar();

CropTools.init();
CropTools.onSaved(() => {
    buildTimeline().then(() => requestAnimationFrame(layoutAll));
});

buildTimeline().then(() => {
    requestAnimationFrame(layoutAll);
});

heightSlider.addEventListener('input', () => {
    localStorage.setItem('yearHeight', heightSlider.value);
    layoutAll();
});

window.addEventListener('resize', debounce(() => {
    updateHeaderHeightVar();
    layoutAll();
}, 150));

window.addEventListener('scroll', updateHeaderScroll, { passive: true });
updateHeaderScroll();

const themeToggle = document.getElementById('themeToggle');

function applyTheme(theme){
    if(theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    else document.documentElement.removeAttribute('data-theme');
    themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
    localStorage.setItem('theme', theme);
}

applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light');

themeToggle.addEventListener('click', () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    applyTheme(isDark ? 'light' : 'dark');
    updateHeaderHeightVar();
});

const lightbox = document.getElementById('lightbox');
const lightboxFrame = document.getElementById('lightboxFrame');
const lightboxImg = document.getElementById('lightboxImg');
const lightboxCaption = document.getElementById('lightboxCaption');
const lightboxClose = document.getElementById('lightboxClose');
const lightboxPrev = document.getElementById('lightboxPrev');
const lightboxNext = document.getElementById('lightboxNext');

let currentLightboxIndex = -1;

function resetLightboxFrame(){
    lightboxFrame.style.width = '';
    lightboxFrame.style.height = '';
    lightboxImg.style.position = '';
    lightboxImg.style.width = '';
    lightboxImg.style.height = '';
    lightboxImg.style.left = '';
    lightboxImg.style.top = '';
    lightboxImg.style.maxWidth = '';
    lightboxImg.style.maxHeight = '';
}

async function openLightboxAt(index){
    if(index < 0 || index >= lightboxSequence.length) return;
    currentLightboxIndex = index;
    const entry = lightboxSequence[index];

    resetLightboxFrame();
    lightboxImg.src = entry.src;
    lightboxImg.alt = entry.alt || '';

    lightboxCaption.textContent = entry.caption || '';
    lightboxCaption.style.display = entry.caption ? 'block' : 'none';

    lightboxPrev.disabled = index === 0;
    lightboxNext.disabled = index === lightboxSequence.length - 1;

    // Must be visible (display:flex, not display:none) before applyCropFit
    // runs, since it reads clientWidth/clientHeight off the frame - those
    // are 0 on a display:none element regardless of any inline size set.
    lightbox.classList.add('open');
    document.body.classList.add('lightbox-active');
    document.body.style.overflow = 'hidden';

    const crops = await CropTools.loadCrops();
    const cropRect = crops[entry.key] && crops[entry.key].timeline;
    if(cropRect){
        const fit = () => {
            CropTools.applyCropFit(lightboxImg, lightboxFrame, cropRect, window.innerWidth * 0.9, window.innerHeight * 0.8);
        };
        if(lightboxImg.complete && lightboxImg.naturalWidth) fit();
        else lightboxImg.addEventListener('load', fit, { once: true });
    }
}

function closeLightbox(){
    lightbox.classList.remove('open');
    document.body.classList.remove('lightbox-active');
    document.body.style.overflow = '';
}

lightboxClose.addEventListener('click', closeLightbox);
lightboxPrev.addEventListener('click', () => openLightboxAt(currentLightboxIndex - 1));
lightboxNext.addEventListener('click', () => openLightboxAt(currentLightboxIndex + 1));

lightbox.addEventListener('click', e => {
    if(e.target === lightbox) closeLightbox();
});

document.addEventListener('keydown', e => {
    if(e.key === 'Escape') closeLightbox();
    if(!lightbox.classList.contains('open')) return;
    if(e.key === 'ArrowLeft') openLightboxAt(currentLightboxIndex - 1);
    else if(e.key === 'ArrowRight') openLightboxAt(currentLightboxIndex + 1);
});

window.addEventListener('resize', debounce(() => {
    if(lightbox.classList.contains('open')) openLightboxAt(currentLightboxIndex);
}, 150));

</script>

</body>
</html>
