<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carl Wooldridge | 50 Years</title>

<script>
(function(){
    try {
        if(localStorage.getItem('theme') === 'dark'){
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    } catch(e){}
})();
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --header-height:320px;

    --bg:#f8f6f3;
    --text:#222;
    --heading:#222;
    --muted:#777;
    --muted2:#888;
    --border:#ddd;
    --control-bg:rgba(255,255,255,.85);
    --control-text:#888;
}

[data-theme="dark"]{
    --bg:#16161a;
    --text:#e6e4e0;
    --heading:#f2f0ec;
    --muted:#9a9a9a;
    --muted2:#8a8a8a;
    --border:#333;
    --control-bg:rgba(35,35,40,.85);
    --control-text:#ccc;
}

body{

    background:var(--bg);
    color:var(--text);
    font-family:Inter,sans-serif;
    line-height:1.6;

    transition:background-color .3s ease, color .3s ease;
}

header{

    position:sticky;
    top:0;
    z-index:50;

    background:var(--bg);

    text-align:center;
    padding:60px 20px 28px;

    transition:background-color .3s ease;
}

header h1{

    font-family:"Cormorant Garamond",serif;
    font-size:68px;
    font-weight:400;
    letter-spacing:6px;
    color:var(--heading);
}

header h2{

    margin-top:18px;
    font-size:20px;
    letter-spacing:5px;
    color:var(--muted);
    font-weight:300;
}

header p{

    margin-top:30px;
    color:var(--muted);
}

.view-switch{

    margin-top:18px;
}

.view-switch a{

    color:var(--muted);
    font-size:12px;
    letter-spacing:2px;
    text-transform:uppercase;
    text-decoration:none;
    border-bottom:1px solid var(--border);
    padding-bottom:2px;
    transition:color .2s ease, border-color .2s ease;
}

.view-switch a:hover{

    color:var(--heading);
    border-color:var(--heading);
}

.timeline{

    width:min(1050px,92%);
    margin:auto;
}

.empty-state{

    text-align:center;
    padding:60px 20px;
    color:var(--muted2);
    font-family:"Cormorant Garamond",serif;
    font-size:22px;
}

.year{

    display:grid;
    grid-template-columns:220px 1fr;
    gap:70px;

    padding:90px 0;

    border-top:1px solid var(--border);
}

.year:first-child{

    border-top:none;
}

.year-label{

    position:sticky;
    top:calc(var(--header-height) + 24px);
    align-self:start;
}

.year-number{

    font-family:"Cormorant Garamond",serif;
    font-size:64px;
    font-weight:400;
}

.year-sub{

    margin-top:8px;
    color:var(--muted2);
    letter-spacing:2px;
    font-size:13px;
    text-transform:uppercase;
}

.photos{

    display:flex;
    flex-wrap:wrap;
    align-items:flex-start;
    gap:16px;
}

.photo{

    position:relative;
    overflow:hidden;
    border-radius:8px;
    line-height:0;
}

.photo img{

    display:block;
    width:auto;
    max-width:100%;
    border-radius:8px;
    cursor:pointer;
    transition:height .2s ease, transform .35s ease;
}

.photo:hover img{

    transform:scale(1.03);
}

.height-control{

    position:fixed;
    top:24px;
    right:24px;
    z-index:100;

    display:flex;
    align-items:center;
    gap:10px;

    padding:10px 18px;
    border-radius:30px;

    background:var(--control-bg);
    backdrop-filter:blur(6px);
    box-shadow:0 6px 20px rgba(0,0,0,.08);

    font-size:11px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--control-text);

    transition:background-color .3s ease, color .3s ease, opacity .2s ease;
}

.height-control input[type=range]{

    width:110px;
    accent-color:var(--text);
}

.theme-toggle{

    position:fixed;
    top:24px;
    left:24px;
    z-index:100;

    width:44px;
    height:44px;
    border:none;
    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    background:var(--control-bg);
    backdrop-filter:blur(6px);
    box-shadow:0 6px 20px rgba(0,0,0,.08);

    font-size:18px;
    cursor:pointer;
    color:var(--control-text);

    transition:background-color .3s ease, color .3s ease, transform .2s ease, opacity .2s ease;
}

.theme-toggle:hover{

    transform:scale(1.08);
}

.photo .caption{

    position:absolute;
    left:0;
    right:0;
    bottom:0;

    padding:14px 16px 12px;
    font-size:13px;
    line-height:1.4;
    color:#fff;

    background:linear-gradient(to top, rgba(0,0,0,.65), rgba(0,0,0,0));

    opacity:0;
    transition:opacity .25s ease;
    pointer-events:none;
}

.photo:hover .caption{

    opacity:1;
}

.lightbox{

    position:fixed;
    inset:0;
    z-index:300;

    display:none;
    align-items:center;
    justify-content:center;

    padding:60px 40px;

    background:rgba(0,0,0,.85);
}

.lightbox.open{

    display:flex;
}

.lightbox-content{

    position:relative;
    max-width:90vw;
    max-height:90vh;

    display:flex;
    flex-direction:column;
    align-items:center;
}

.lightbox-content img{

    display:block;
    max-width:90vw;
    max-height:80vh;
    border-radius:8px;
    box-shadow:0 25px 60px rgba(0,0,0,.5);
}

.lightbox-caption{

    margin-top:18px;
    max-width:600px;

    color:#f2f0ec;
    font-size:15px;
    text-align:center;
}

.lightbox-close{

    position:fixed;
    top:24px;
    right:24px;
    z-index:310;

    width:44px;
    height:44px;
    border:none;
    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    background:rgba(255,255,255,.15);
    color:#fff;
    font-size:24px;
    line-height:1;
    cursor:pointer;

    transition:background-color .2s ease;
}

.lightbox-close:hover{

    background:rgba(255,255,255,.3);
}

body.lightbox-active .height-control,
body.lightbox-active .theme-toggle{

    opacity:0;
    pointer-events:none;
}

footer{

    text-align:center;
    padding:120px 20px;
    color:var(--muted);
    font-family:"Cormorant Garamond",serif;
    font-size:28px;
}

@media(max-width:900px){

.year{

    grid-template-columns:1fr;
    gap:35px;
    padding:60px 0;
}

.year-label{

    position:relative;
    top:auto;
}

.year-number{

    font-size:48px;
}

header h1{

    font-size:48px;
}

.height-control{

    top:14px;
    right:14px;
    padding:8px 14px;
}

.height-control input[type=range]{

    width:80px;
}

.theme-toggle{

    top:14px;
    left:14px;
    width:38px;
    height:38px;
    font-size:16px;
}

.lightbox-close{

    top:14px;
    right:14px;
}

}

</style>

</head>

<body>

<button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">🌙</button>

<div class="height-control">
<label for="heightSlider">Height</label>
<input type="range" id="heightSlider" min="60" max="600" step="10" value="300">
</div>

<header>

<h1>CARL WOOLDRIDGE</h1>

<h2>50 YEARS</h2>

<p>August 1976 — August 2026</p>

<div class="view-switch">
<a href="grid.html">Grid View →</a>
</div>

</header>

<div class="timeline" id="timeline"></div>

<footer>

“The days are long, but the years are short.”

</footer>

<div class="lightbox" id="lightbox">
<button class="lightbox-close" id="lightboxClose" aria-label="Close">&times;</button>
<div class="lightbox-content">
<img id="lightboxImg" src="" alt="">
<div class="lightbox-caption" id="lightboxCaption"></div>
</div>
</div>

<script>

const START_YEAR = 1976;
const END_YEAR = 2026;
const MAX_PHOTOS_PER_YEAR = 40;
const PHOTO_GAP = 16;

function loadImage(src){
    return new Promise(resolve => {
        const img = new Image();
        img.onload = () => resolve({ ok: true, ratio: img.naturalWidth / img.naturalHeight || 1 });
        img.onerror = () => resolve({ ok: false });
        img.src = src;
    });
}

async function findPhotosForYear(year){
    const photos = [];
    for(let n = 1; n <= MAX_PHOTOS_PER_YEAR; n++){
        const src = `photos/${year}-${n}.jpg`;
        const result = await loadImage(src);
        if(!result.ok) break;
        photos.push({ src, key: `${year}-${n}`, ratio: result.ratio });
    }
    return photos;
}

function debounce(fn, wait){
    let t;
    return (...args) => {
        clearTimeout(t);
        t = setTimeout(() => fn(...args), wait);
    };
}

function simulateRowCount(items, containerWidth, rowHeight, gap){
    let rows = 1, cur = 0;
    items.forEach((item, i) => {
        const w = Math.min(rowHeight * item.ratio, containerWidth);
        if(i === 0){ cur = w; return; }
        if(cur + gap + w > containerWidth){ rows++; cur = w; }
        else cur += gap + w;
    });
    return rows;
}

function computeRowHeight(items, containerWidth, targetHeight, gap){
    if(items.length === 0 || containerWidth <= 0) return targetHeight;
    let lo = 20, hi = Math.max(targetHeight, 20);
    for(let i = 0; i < 20; i++){
        const mid = (lo + hi) / 2;
        const rows = simulateRowCount(items, containerWidth, mid, gap);
        const total = rows * mid + (rows - 1) * gap;
        if(total > targetHeight) hi = mid; else lo = mid;
    }
    return lo;
}

const yearBlocks = [];

function layoutYear(block, targetHeight){
    const containerWidth = block.photosEl.clientWidth;
    const rowHeight = computeRowHeight(block.items, containerWidth, targetHeight, PHOTO_GAP);
    block.items.forEach(item => {
        item.imgEl.style.height = rowHeight + 'px';
    });
}

function layoutAll(){
    const targetHeight = parseFloat(heightSlider.value);
    yearBlocks.forEach(block => layoutYear(block, targetHeight));
}

function updateHeaderHeightVar(){
    const header = document.querySelector('header');
    document.documentElement.style.setProperty('--header-height', header.offsetHeight + 'px');
}

function parseCSV(text){
    const rows = [];
    let row = [], field = '', inQuotes = false;
    for(let i = 0; i < text.length; i++){
        const c = text[i];
        if(inQuotes){
            if(c === '"'){
                if(text[i+1] === '"'){ field += '"'; i++; }
                else inQuotes = false;
            } else field += c;
        } else {
            if(c === '"') inQuotes = true;
            else if(c === ',') { row.push(field); field = ''; }
            else if(c === '\n' || c === '\r'){
                if(c === '\r' && text[i+1] === '\n') i++;
                row.push(field); field = '';
                if(row.length > 1 || row[0] !== '') rows.push(row);
                row = [];
            } else field += c;
        }
    }
    if(field !== '' || row.length){ row.push(field); rows.push(row); }
    return rows;
}

async function loadCaptions(){
    const map = {};
    try {
        const res = await fetch('captions.csv');
        if(!res.ok) return map;
        const text = await res.text();
        const rows = parseCSV(text);
        for(const row of rows){
            if(row.length < 2) continue;
            const key = (row[0] || '').trim();
            const caption = (row[1] || '').trim();
            if(!key || key.toLowerCase() === 'key') continue;
            map[key] = caption;
        }
    } catch(e){
        console.warn('Could not load captions.csv', e);
    }
    return map;
}

async function buildTimeline(){
    const timeline = document.getElementById('timeline');
    const captions = await loadCaptions();

    const yearPromises = [];
    for(let year = START_YEAR; year <= END_YEAR; year++){
        yearPromises.push(findPhotosForYear(year).then(photos => ({ year, photos })));
    }
    const years = await Promise.all(yearPromises);

    let rendered = 0;

    for(const { year, photos } of years){
        if(photos.length === 0) continue;
        rendered++;

        const section = document.createElement('section');
        section.className = 'year';

        const label = document.createElement('div');
        label.className = 'year-label';

        const num = document.createElement('div');
        num.className = 'year-number';
        num.textContent = year;
        label.appendChild(num);

        const sub = captions[String(year)];
        if(sub){
            const subEl = document.createElement('div');
            subEl.className = 'year-sub';
            subEl.textContent = sub;
            label.appendChild(subEl);
        }

        section.appendChild(label);

        const grid = document.createElement('div');
        grid.className = 'photos';

        const items = [];

        for(const photo of photos){
            const card = document.createElement('div');
            card.className = 'photo';

            const img = document.createElement('img');
            img.src = photo.src;
            img.loading = 'lazy';
            img.alt = captions[photo.key] || `${year} photo`;
            img.addEventListener('click', () => openLightbox(photo.src, img.alt, captions[photo.key]));
            card.appendChild(img);

            const cap = captions[photo.key];
            if(cap){
                const capEl = document.createElement('div');
                capEl.className = 'caption';
                capEl.textContent = cap;
                card.appendChild(capEl);
            }

            grid.appendChild(card);
            items.push({ ratio: photo.ratio, imgEl: img });
        }

        section.appendChild(grid);
        timeline.appendChild(section);

        yearBlocks.push({ photosEl: grid, items });
    }

    if(rendered === 0){
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.textContent = 'Photos will appear here as they’re added to the photos/ folder.';
        timeline.appendChild(empty);
    }
}

const heightSlider = document.getElementById('heightSlider');
const savedHeight = localStorage.getItem('yearHeight');
if(savedHeight) heightSlider.value = savedHeight;

updateHeaderHeightVar();

buildTimeline().then(() => {
    requestAnimationFrame(layoutAll);
});

heightSlider.addEventListener('input', () => {
    localStorage.setItem('yearHeight', heightSlider.value);
    layoutAll();
});

window.addEventListener('resize', debounce(() => {
    updateHeaderHeightVar();
    layoutAll();
}, 150));

const themeToggle = document.getElementById('themeToggle');

function applyTheme(theme){
    if(theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    else document.documentElement.removeAttribute('data-theme');
    themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
    localStorage.setItem('theme', theme);
}

applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light');

themeToggle.addEventListener('click', () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    applyTheme(isDark ? 'light' : 'dark');
    updateHeaderHeightVar();
});

const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightboxImg');
const lightboxCaption = document.getElementById('lightboxCaption');
const lightboxClose = document.getElementById('lightboxClose');

function openLightbox(src, alt, caption){
    lightboxImg.src = src;
    lightboxImg.alt = alt || '';
    lightboxCaption.textContent = caption || '';
    lightboxCaption.style.display = caption ? 'block' : 'none';
    lightbox.classList.add('open');
    document.body.classList.add('lightbox-active');
    document.body.style.overflow = 'hidden';
}

function closeLightbox(){
    lightbox.classList.remove('open');
    document.body.classList.remove('lightbox-active');
    document.body.style.overflow = '';
}

lightboxClose.addEventListener('click', closeLightbox);

lightbox.addEventListener('click', e => {
    if(e.target === lightbox) closeLightbox();
});

document.addEventListener('keydown', e => {
    if(e.key === 'Escape') closeLightbox();
});

</script>

</body>
</html>
