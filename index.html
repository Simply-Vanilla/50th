<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carl Wooldridge | 50 Years</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --photo-height:300px;
}

body{

    background:#f8f6f3;
    color:#222;
    font-family:Inter,sans-serif;
    line-height:1.6;
}

header{

    text-align:center;
    padding:80px 20px 100px;
}

header h1{

    font-family:"Cormorant Garamond",serif;
    font-size:68px;
    font-weight:400;
    letter-spacing:6px;
}

header h2{

    margin-top:18px;
    font-size:20px;
    letter-spacing:5px;
    color:#666;
    font-weight:300;
}

header p{

    margin-top:30px;
    color:#777;
}

.timeline{

    width:min(1050px,92%);
    margin:auto;
}

.empty-state{

    text-align:center;
    padding:60px 20px;
    color:#999;
    font-family:"Cormorant Garamond",serif;
    font-size:22px;
}

.year{

    display:grid;
    grid-template-columns:220px 1fr;
    gap:70px;

    padding:90px 0;

    border-top:1px solid #ddd;
}

.year:first-child{

    border-top:none;
}

.year-label{

    position:sticky;
    top:80px;
    align-self:start;
}

.year-number{

    font-family:"Cormorant Garamond",serif;
    font-size:64px;
    font-weight:400;
}

.year-sub{

    margin-top:8px;
    color:#888;
    letter-spacing:2px;
    font-size:13px;
    text-transform:uppercase;
}

.photos{

    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:22px;
}

.photo{

    overflow:hidden;
    border-radius:8px;
    background:white;

    box-shadow:0 10px 25px rgba(0,0,0,.08);

    transition:.35s;
}

.photo:hover{

    transform:translateY(-5px);
    box-shadow:0 18px 35px rgba(0,0,0,.18);
}

.photo img{

    display:block;
    width:100%;
    height:var(--photo-height);
    object-fit:cover;
    transition:height .25s ease;
}

.height-control{

    position:fixed;
    top:24px;
    right:24px;
    z-index:100;

    display:flex;
    align-items:center;
    gap:10px;

    padding:10px 18px;
    border-radius:30px;

    background:rgba(255,255,255,.85);
    backdrop-filter:blur(6px);
    box-shadow:0 6px 20px rgba(0,0,0,.08);

    font-size:11px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:#888;
}

.height-control input[type=range]{

    width:110px;
    accent-color:#222;
}

.photo .caption{

    padding:14px 18px;
    font-size:14px;
    color:#555;
}

footer{

    text-align:center;
    padding:120px 20px;
    color:#777;
    font-family:"Cormorant Garamond",serif;
    font-size:28px;
}

@media(max-width:900px){

.year{

    grid-template-columns:1fr;
    gap:35px;
    padding:60px 0;
}

.year-label{

    position:relative;
    top:auto;
}

.year-number{

    font-size:48px;
}

header h1{

    font-size:48px;
}

.height-control{

    top:14px;
    right:14px;
    padding:8px 14px;
}

.height-control input[type=range]{

    width:80px;
}

}

</style>

</head>

<body>

<div class="height-control">
<label for="heightSlider">Photo Height</label>
<input type="range" id="heightSlider" min="150" max="600" step="10" value="300">
</div>

<header>

<h1>CARL WOOLDRIDGE</h1>

<h2>50 YEARS</h2>

<p>August 1976 — August 2026</p>

</header>

<div class="timeline" id="timeline"></div>

<footer>

“The days are long, but the years are short.”

</footer>

<script>

const START_YEAR = 1976;
const END_YEAR = 2026;
const MAX_PHOTOS_PER_YEAR = 40;

function loadImage(src){
    return new Promise(resolve => {
        const img = new Image();
        img.onload = () => resolve(true);
        img.onerror = () => resolve(false);
        img.src = src;
    });
}

async function findPhotosForYear(year){
    const photos = [];
    for(let n = 1; n <= MAX_PHOTOS_PER_YEAR; n++){
        const src = `photos/${year}-${n}.jpg`;
        const ok = await loadImage(src);
        if(!ok) break;
        photos.push({ src, key: `${year}-${n}` });
    }
    return photos;
}

function parseCSV(text){
    const rows = [];
    let row = [], field = '', inQuotes = false;
    for(let i = 0; i < text.length; i++){
        const c = text[i];
        if(inQuotes){
            if(c === '"'){
                if(text[i+1] === '"'){ field += '"'; i++; }
                else inQuotes = false;
            } else field += c;
        } else {
            if(c === '"') inQuotes = true;
            else if(c === ',') { row.push(field); field = ''; }
            else if(c === '\n' || c === '\r'){
                if(c === '\r' && text[i+1] === '\n') i++;
                row.push(field); field = '';
                if(row.length > 1 || row[0] !== '') rows.push(row);
                row = [];
            } else field += c;
        }
    }
    if(field !== '' || row.length){ row.push(field); rows.push(row); }
    return rows;
}

async function loadCaptions(){
    const map = {};
    try {
        const res = await fetch('captions.csv');
        if(!res.ok) return map;
        const text = await res.text();
        const rows = parseCSV(text);
        for(const row of rows){
            if(row.length < 2) continue;
            const key = (row[0] || '').trim();
            const caption = (row[1] || '').trim();
            if(!key || key.toLowerCase() === 'key') continue;
            map[key] = caption;
        }
    } catch(e){
        console.warn('Could not load captions.csv', e);
    }
    return map;
}

async function buildTimeline(){
    const timeline = document.getElementById('timeline');
    const captions = await loadCaptions();

    const yearPromises = [];
    for(let year = START_YEAR; year <= END_YEAR; year++){
        yearPromises.push(findPhotosForYear(year).then(photos => ({ year, photos })));
    }
    const years = await Promise.all(yearPromises);

    let rendered = 0;

    for(const { year, photos } of years){
        if(photos.length === 0) continue;
        rendered++;

        const section = document.createElement('section');
        section.className = 'year';

        const label = document.createElement('div');
        label.className = 'year-label';

        const num = document.createElement('div');
        num.className = 'year-number';
        num.textContent = year;
        label.appendChild(num);

        const sub = captions[String(year)];
        if(sub){
            const subEl = document.createElement('div');
            subEl.className = 'year-sub';
            subEl.textContent = sub;
            label.appendChild(subEl);
        }

        section.appendChild(label);

        const grid = document.createElement('div');
        grid.className = 'photos';

        for(const photo of photos){
            const card = document.createElement('div');
            card.className = 'photo';

            const img = document.createElement('img');
            img.src = photo.src;
            img.loading = 'lazy';
            img.alt = captions[photo.key] || `${year} photo`;
            card.appendChild(img);

            const cap = captions[photo.key];
            if(cap){
                const capEl = document.createElement('div');
                capEl.className = 'caption';
                capEl.textContent = cap;
                card.appendChild(capEl);
            }

            grid.appendChild(card);
        }

        section.appendChild(grid);
        timeline.appendChild(section);
    }

    if(rendered === 0){
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.textContent = 'Photos will appear here as they’re added to the photos/ folder.';
        timeline.appendChild(empty);
    }
}

buildTimeline();

const heightSlider = document.getElementById('heightSlider');
const savedHeight = localStorage.getItem('photoHeight');
if(savedHeight){
    heightSlider.value = savedHeight;
    document.documentElement.style.setProperty('--photo-height', savedHeight + 'px');
}
heightSlider.addEventListener('input', () => {
    document.documentElement.style.setProperty('--photo-height', heightSlider.value + 'px');
    localStorage.setItem('photoHeight', heightSlider.value);
});

</script>

</body>
</html>
